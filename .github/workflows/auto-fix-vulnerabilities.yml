name: Auto-fix Security Vulnerabilities

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  # Job 1: Ejecutar tests automáticamente
  test:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js # Ajusta según tu stack
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        id: test
        run: npm test
        continue-on-error: true
        
      - name: Run linter
        if: steps.test.outcome == 'success'
        run: npm run lint
        continue-on-error: true

  # Job 2: Auto-fix si los tests fallan
  auto-fix:
    needs: test
    if: failure() && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Auto-fix linting issues
        run: npm run lint:fix || true
        
      - name: Run tests again
        id: retest
        run: npm test
        continue-on-error: true
        
      - name: Commit fixes if tests pass
        if: steps.retest.outcome == 'success'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --staged --quiet || git commit -m "chore: auto-fix issues after dependency update"
          git push

  # Job 3: Auto-merge si todo pasa
  auto-merge:
    needs: test
    if: success() && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}