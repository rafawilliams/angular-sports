name: Notify on Failure

on:
  workflow_run:
    workflows: ["Auto-fix Security Vulnerabilities"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Send notification
        uses: actions/github-script@v9
        with:
          script: |
            const pr_number = github.event.workflow_run.pull_requests[0]?.number;
            if (pr_number) {
              await github.rest.issues.createComment({
                issue_number: pr_number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '⚠️ **Auto-fix workflow failed**\n\nSe requiere revisión manual. Por favor revisa los logs del workflow.'
              });
            }