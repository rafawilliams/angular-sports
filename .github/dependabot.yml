version: 2
updates:
  # Actualizar dependencias de npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Agrupar actualizaciones menores
    groups:
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "patch"
    labels:
      - "dependencies"
      - "automated"
    # Configuración específica para Node.js
    versioning-strategy: auto
    # Ignorar algunas dependencias si es necesario
    # ignore:
    #   - dependency-name: "express"
    #     versions: ["5.x"]
  
  # Actualizar GitHub Actions también
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"